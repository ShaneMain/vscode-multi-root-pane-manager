name: Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile extension
      run: npm run compile

    - name: Package extension
      run: npx vsce package

    - name: Get version from package.json
      id: package_version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Determine release type
      id: release_type
      run: |
        # Get the branch that contains this tag
        BRANCH=$(git branch -r --contains ${{ github.ref_name }} | grep -E '(origin/master|origin/main)' || echo "")
        if [ -z "$BRANCH" ]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
          echo "release_name=Pre-release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
          echo "release_name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ steps.release_type.outputs.release_name }}
        draft: false
        prerelease: ${{ steps.release_type.outputs.prerelease }}
        files: |
          *.vsix
        body: |
          ## Installation

          Download the `.vsix` file below and install it in VS Code:
          1. Open VS Code
          2. Press `Ctrl+Shift+P` (or `Cmd+Shift+P` on Mac)
          3. Type "Extensions: Install from VSIX..."
          4. Select the downloaded file

          Or install via command line:
          ```bash
          code --install-extension multi-root-pane-manager-${{ steps.package_version.outputs.version }}.vsix
          ```

          ## What's Changed
          - See commit history for details
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to VS Code Marketplace
      run: npx vsce publish --packagePath *.vsix
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}

    - name: Publish to Open VSX Registry
      run: npx ovsx publish *.vsix
      env:
        OVSX_PAT: ${{ secrets.OVSX_PAT }}
