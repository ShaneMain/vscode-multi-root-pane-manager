name: Release Extension

on:
  push:
    branches: [master]
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Bump version
      id: bump
      run: |
        NEW_VERSION=$(npm version patch --no-git-tag-version)
        echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

    - run: npm ci
    - run: npm run compile
    - run: npx vsce package

    - name: Commit version bump via PR
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="chore/bump-${{ steps.bump.outputs.version }}"
        git checkout -b "$BRANCH"
        git add package.json package-lock.json
        git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
        git push origin "$BRANCH"
        gh pr create --base master --head "$BRANCH" \
          --title "chore: bump version to ${{ steps.bump.outputs.version }}" \
          --body "Automated version bump" --label "automated"
        gh pr merge "$BRANCH" --squash --auto --delete-branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Tag release
      run: |
        git tag ${{ steps.bump.outputs.version }}
        git push origin ${{ steps.bump.outputs.version }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.bump.outputs.version }}
        name: Release ${{ steps.bump.outputs.version }}
        files: '*.vsix'
        body: |
          ## Installation

          Download the `.vsix` file below and install:
          ```bash
          code --install-extension multi-root-pane-manager-${{ steps.bump.outputs.version }}.vsix
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to VS Code Marketplace
      continue-on-error: true
      run: npx vsce publish --packagePath *.vsix
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}

    - name: Publish to Open VSX Registry
      run: npx ovsx publish *.vsix
      env:
        OVSX_PAT: ${{ secrets.OVSX_PAT }}
